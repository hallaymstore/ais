<!DOCTYPE html>
<html lang="uz" data-theme="day">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatlar | Ai's Shelf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#f7f2ea;--surface:rgba(255,255,255,.9);--surface-2:rgba(16,32,51,.05);--line:rgba(16,32,51,.08);--ink:#102033;--muted:#5f7288;--accent:#2a8a7d;--accent-2:#102033;--gold:#c88639;--danger:#b34a3b;--shadow:0 24px 60px rgba(16,32,51,.12)}
    :root[data-theme="night"]{--bg:#09111d;--surface:rgba(12,19,32,.9);--surface-2:rgba(255,255,255,.06);--line:rgba(255,255,255,.08);--ink:#eef6ff;--muted:#93a6bd;--accent:#62dfc6;--accent-2:#dffdf6;--gold:#efb86b;--danger:#ff8c79;--shadow:0 24px 70px rgba(0,0,0,.45)}
    *{box-sizing:border-box} body{margin:0;font-family:"Manrope",sans-serif;color:var(--ink);background:radial-gradient(circle at top left,color-mix(in srgb,var(--accent) 16%,transparent),transparent 22%),linear-gradient(180deg,var(--bg) 0%,color-mix(in srgb,var(--bg) 92%,white 8%) 100%)}
    a{color:inherit;text-decoration:none} button,input,select{font:inherit}.shell{width:min(1280px,calc(100vw - 28px));margin:0 auto}
    .topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)} .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 0}.brand{display:flex;align-items:center;gap:14px;font-weight:800}.brand-mark{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,var(--accent-2),var(--accent));box-shadow:var(--shadow);font-family:"Space Grotesk",sans-serif}
    .panel,.card{border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);background:var(--surface);backdrop-filter:blur(18px)} h1,h2,h3{margin:0;font-family:"Space Grotesk",sans-serif;letter-spacing:-.04em}
    .page{display:grid;gap:18px;padding:24px 0 32px}.page-head{padding:22px;display:grid;gap:18px}.head-row,.head-actions,.stats,.filters,.card-actions,.meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .head-row{justify-content:space-between;align-items:flex-start}.page-head p,.helper,.card p{margin:0;color:var(--muted);line-height:1.65}.pill,.status{display:inline-flex;width:fit-content;border-radius:999px;font-weight:800}.pill{padding:8px 12px;font-size:12px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted)} .status{padding:7px 10px;font-size:12px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted)} .status.requested{background:color-mix(in srgb,var(--gold) 16%,transparent);color:color-mix(in srgb,var(--gold) 76%,var(--ink))} .status.active{background:color-mix(in srgb,var(--accent) 16%,transparent);color:color-mix(in srgb,var(--accent) 76%,var(--ink))} .status.closed{background:color-mix(in srgb,var(--danger) 16%,transparent);color:color-mix(in srgb,var(--danger) 82%,var(--ink))}
    .button,button{border:0;border-radius:999px;padding:12px 16px;cursor:pointer;font-weight:800}.button.primary,button.primary{color:#fff;background:linear-gradient(135deg,var(--accent-2),var(--accent))}.button.secondary,button.secondary{color:var(--ink);background:color-mix(in srgb,var(--surface) 88%,transparent);border:1px solid var(--line)}
    .stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.stat{padding:16px;border-radius:22px;background:var(--surface-2);border:1px solid var(--line)} .stat strong{display:block;font-size:20px;margin-top:8px}
    .layout{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start}.panel{padding:18px}
    input,select{width:100%;border-radius:18px;border:1px solid var(--line);background:color-mix(in srgb,var(--surface) 94%,transparent);color:var(--ink);padding:14px 15px;outline:none}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.card{padding:18px;display:grid;gap:14px}
    .empty{padding:22px;border-radius:24px;border:1px dashed var(--line);background:color-mix(in srgb,var(--surface) 72%,transparent);color:var(--muted)} .success{color:#176853}.error{color:#b34a3b}
    @media (max-width:1080px){.layout{grid-template-columns:1fr}.grid,.stats{grid-template-columns:1fr 1fr}}
    @media (max-width:720px){.head-row{flex-direction:column}.grid,.stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="shell nav">
      <a class="brand" href="/"><span class="brand-mark"></span><span data-site-brand-name>Ai's Shelf</span></a>
    </div>
  </div>
  <main class="shell page">
    <section class="panel page-head">
      <div class="head-row">
        <div>
          <span class="pill">Chatlar</span>
          <h1 style="margin-top:10px;font-size:clamp(2rem,4vw,3rem);">Service threadlar</h1>
          <p id="statusText">Tayyor.</p>
        </div>
        <div class="head-actions">
          <a class="button secondary" href="/search.html">Qidiruv</a>
          <a class="button secondary" href="/recommendations.html">Xizmatlar</a>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><small>Jami</small><strong id="totalStat">0</strong></div>
        <div class="stat"><small>Requested</small><strong id="requestedStat">0</strong></div>
        <div class="stat"><small>Active</small><strong id="activeStat">0</strong></div>
      </div>
    </section>

    <section class="layout">
      <aside class="panel">
        <div class="filters">
          <input id="queryInput" type="text" placeholder="Ism yoki preview..." />
          <select id="statusFilter"><option value="all">Barcha status</option><option value="requested">Requested</option><option value="active">Active</option><option value="closed">Closed</option></select>
          <select id="typeFilter"></select>
          <button class="button primary" id="reloadBtn" type="button">Yangilash</button>
        </div>
      </aside>

      <div>
        <div class="grid" id="threadGrid"></div>
        <div class="empty" id="emptyState" style="display:none;">Hali service thread yo'q.</div>
      </div>
    </section>
  </main>

  <script>
    const state = { user:null, config:null, threads:[], query:"", status:"all", type:"all" };
    const threadGrid = document.getElementById("threadGrid");
    const emptyState = document.getElementById("emptyState");
    const statusText = document.getElementById("statusText");

    function escapeHtml(value){return String(value||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
    function setStatus(text,tone=""){statusText.textContent=text; statusText.className=tone||""}

    async function ensureAuth(){
      const response = await fetch("/api/auth/me");
      const data = await response.json();
      if(!data.user){ location.href="/login.html?next=/chats.html"; throw new Error("Unauthenticated"); }
      state.user = data.user;
    }

    async function loadBootstrap(){
      await ensureAuth();
      const configRes = await fetch("/api/config");
      state.config = await configRes.json();
      document.getElementById("typeFilter").innerHTML = `<option value="all">Barcha yo'nalish</option>${(state.config.providerTypes||[]).map((item)=>`<option value="${item.id}">${item.name}</option>`).join("")}`;
    }

    async function loadThreads(){
      const response = await fetch("/api/provider-threads");
      const data = await response.json();
      if(!response.ok) throw new Error(data.error || "Threadlar yuklanmadi.");
      state.threads = data.threads || [];
      renderStats();
      renderThreads();
    }

    function renderStats(){
      document.getElementById("totalStat").textContent = String(state.threads.length);
      document.getElementById("requestedStat").textContent = String(state.threads.filter((item)=>item.status==="requested").length);
      document.getElementById("activeStat").textContent = String(state.threads.filter((item)=>item.status==="active").length);
    }

    function filteredThreads(){
      const q = state.query.trim().toLowerCase();
      return state.threads.filter((thread)=>{
        const counterpart = state.user.role === "provider" ? (thread.requester?.name || "Mijoz") : (thread.provider?.name || thread.providerTypeLabel || "Provider");
        const haystack = [counterpart, thread.providerTypeLabel, thread.lastMessagePreview, thread.title].join(" ").toLowerCase();
        const okQuery = !q || haystack.includes(q);
        const okStatus = state.status === "all" || thread.status === state.status;
        const okType = state.type === "all" || thread.providerType === state.type;
        return okQuery && okStatus && okType;
      });
    }

    function renderThreads(){
      const items = filteredThreads();
      emptyState.style.display = items.length ? "none" : "block";
      threadGrid.innerHTML = items.map((thread)=>{
        const counterpart = state.user.role === "provider" ? (thread.requester?.name || "Mijoz") : (thread.provider?.name || thread.providerTypeLabel || "Provider");
        return `
          <article class="card">
            <div class="head-row">
              <div>
                <div class="status ${escapeHtml(thread.status || "requested")}">${escapeHtml(thread.status || "requested")}</div>
                <h3 style="margin-top:8px;font-size:1.2rem;">${escapeHtml(counterpart)}</h3>
              </div>
              <div class="status">${escapeHtml(thread.providerTypeLabel || "Service")}</div>
            </div>
            <p>${escapeHtml(thread.lastMessagePreview || "Yozishma tayyor.")}</p>
            <div class="meta">
              <span>${new Date(thread.updatedAt).toLocaleString()}</span>
              <span>${thread.messageCount || 0} xabar</span>
            </div>
            <div class="card-actions">
              <a class="button primary" href="/chat.html?threadId=${encodeURIComponent(thread.id)}">Ochish</a>
              <a class="button secondary" href="/search.html?type=${encodeURIComponent(thread.providerType || "")}">O'xshashlar</a>
            </div>
          </article>
        `;
      }).join("");
    }

    document.getElementById("queryInput").addEventListener("input",(event)=>{ state.query = event.currentTarget.value; renderThreads(); });
    document.getElementById("statusFilter").addEventListener("change",(event)=>{ state.status = event.currentTarget.value; renderThreads(); });
    document.getElementById("typeFilter").addEventListener("change",(event)=>{ state.type = event.currentTarget.value; renderThreads(); });
    document.getElementById("reloadBtn").addEventListener("click",()=>loadThreads().then(()=>setStatus("Yangilandi.","success")).catch((error)=>setStatus(error.message,"error")));

    Promise.resolve().then(loadBootstrap).then(loadThreads).catch((error)=>{ if(error.message!=="Unauthenticated") setStatus(error.message,"error"); });
  </script>
</body>
</html>

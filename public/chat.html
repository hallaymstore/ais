<!DOCTYPE html>
<html lang="uz" data-theme="day">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Chat | Ai's Shelf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#f7f2ea;--surface:rgba(255,255,255,.9);--surface-2:rgba(16,32,51,.05);--line:rgba(16,32,51,.08);--ink:#102033;--muted:#5f7288;--brand-primary:#2a8a7d;--brand-secondary:#102033;--assistant-accent:#c88639;--shadow:0 24px 60px rgba(16,32,51,.12)}
    :root[data-theme="night"]{--bg:#09111d;--surface:rgba(12,19,32,.9);--surface-2:rgba(255,255,255,.06);--line:rgba(255,255,255,.08);--ink:#eef6ff;--muted:#93a6bd;--brand-primary:#62dfc6;--brand-secondary:#dffdf6;--assistant-accent:#efb86b;--shadow:0 24px 70px rgba(0,0,0,.45)}
    *{box-sizing:border-box} body{margin:0;font-family:"Manrope",sans-serif;color:var(--ink);background:radial-gradient(circle at top left,color-mix(in srgb,var(--brand-primary) 18%,transparent),transparent 20%),linear-gradient(180deg,var(--bg) 0%,color-mix(in srgb,var(--bg) 92%,white 8%) 100%)}
    a{color:inherit;text-decoration:none} button,textarea{font:inherit}.shell{width:min(1480px,calc(100vw - 24px));margin:0 auto}
    .topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)} .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 0}.brand{display:flex;gap:14px;align-items:center;font-weight:800}.brand-mark{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,var(--brand-secondary),var(--brand-primary));box-shadow:var(--shadow);font-family:"Space Grotesk",sans-serif}
    .button,button{border:0;border-radius:999px;padding:12px 16px;cursor:pointer;font-weight:800}.button.primary,button.primary{color:#fff;background:linear-gradient(135deg,var(--brand-secondary),var(--brand-primary))}.button.secondary,button.secondary{color:var(--ink);background:color-mix(in srgb,var(--surface) 88%,transparent);border:1px solid var(--line)}
    .layout{display:grid;grid-template-columns:280px 1fr 300px;gap:16px;padding:18px 0 24px;min-height:calc(100vh - 84px)} h1,h2,h3{margin:0;font-family:"Space Grotesk",sans-serif;letter-spacing:-.04em}
    .panel,.chat-shell,.message,.video-card{border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);background:var(--surface);backdrop-filter:blur(18px)} .panel,.video-card{padding:18px}
    .sidebar,.rail{display:grid;gap:16px;align-content:start}.sidebar-head,.chat-head,.chat-tools,.composer-actions,.meta,.video-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .pill,.status{display:inline-flex;width:fit-content;border-radius:999px;font-weight:800}.pill{padding:8px 12px;font-size:12px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted)} .status{padding:7px 10px;font-size:12px;background:var(--surface-2);border:1px solid var(--line);color:var(--muted)}
    .thread-list{display:grid;gap:10px}.thread-item{padding:14px;border-radius:20px;background:var(--surface-2);border:1px solid var(--line);cursor:pointer}.thread-item.active{outline:2px solid color-mix(in srgb,var(--assistant-accent) 42%,transparent)} .thread-item strong{display:block;margin-bottom:6px}
    .thread-item small,.helper,.meta,.details{color:var(--muted);line-height:1.6}
    .chat-shell{display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}.chat-head{justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,color-mix(in srgb,var(--assistant-accent) 14%,var(--surface)),color-mix(in srgb,var(--surface) 92%,transparent))}
    .assistant-profile{display:flex;gap:14px;align-items:center}.assistant-logo{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;color:#fff;font-weight:800;background:linear-gradient(135deg,var(--brand-secondary),color-mix(in srgb,var(--assistant-accent) 55%,var(--brand-primary) 45%))}
    .messages{display:grid;gap:12px;padding:20px;overflow:auto;background:linear-gradient(180deg,color-mix(in srgb,var(--surface) 84%,transparent),color-mix(in srgb,var(--surface) 95%,transparent))}
    .message{padding:14px 16px;max-width:min(74%,760px)} .message.self{margin-left:auto;background:color-mix(in srgb,var(--brand-primary) 16%,var(--surface))} .message.peer{margin-right:auto;background:color-mix(in srgb,var(--assistant-accent) 10%,var(--surface))} .message img{width:min(100%,320px);border-radius:16px;margin-top:10px}
    .composer{padding:16px;border-top:1px solid var(--line);display:grid;gap:12px;background:color-mix(in srgb,var(--surface) 92%,transparent)} textarea{width:100%;min-height:110px;resize:vertical;border-radius:22px;border:1px solid var(--line);background:color-mix(in srgb,var(--surface) 94%,transparent);color:var(--ink);padding:16px;outline:none}
    .preview{display:none;align-items:center;gap:12px;padding:12px 14px;border-radius:18px;background:var(--surface-2);border:1px dashed var(--line)} .preview img{width:76px;height:76px;object-fit:cover;border-radius:16px}
    .video-frame{border-radius:22px;overflow:hidden;border:1px solid var(--line);background:#09111d}.video-frame video{display:block;width:100%;aspect-ratio:4/3;object-fit:cover;background:#09111d}
    .empty{padding:22px;border-radius:22px;border:1px dashed var(--line);background:var(--surface-2);color:var(--muted)} .success{color:#176853}.error{color:#b34a3b}
    @media (max-width:1240px){.layout{grid-template-columns:280px 1fr}.rail{grid-column:1/-1;grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.rail{grid-template-columns:1fr}.message{max-width:100%}}
  </style>
</head>
<body data-assistant-id="service-chat">
  <div class="topbar">
    <div class="shell nav">
      <a class="brand" href="/"><span class="brand-mark"></span><span data-site-brand-name>Ai's Shelf</span></a>
    </div>
  </div>
  <main class="shell layout">
    <aside class="sidebar">
      <article class="panel">
        <div class="sidebar-head">
          <div>
            <span class="pill">Threadlar</span>
            <h2 style="margin-top:10px;font-size:1.5rem;">Service inbox</h2>
          </div>
          <a class="button secondary" href="/search.html">Qidiruv</a>
        </div>
      </article>
      <article class="panel">
        <div class="thread-list" id="threadList"></div>
      </article>
    </aside>

    <section class="chat-shell">
      <header class="chat-head">
        <div class="assistant-profile">
          <div class="assistant-logo" data-assistant-logo>SV</div>
          <div>
            <div class="pill"><span data-assistant-name>Service chat</span></div>
            <h1 id="chatTitle" style="margin-top:8px;font-size:clamp(1.5rem,3vw,2.2rem);">Service chat</h1>
            <div class="helper" id="chatSubtitle">Thread tanlang.</div>
          </div>
        </div>
        <div class="chat-tools">
          <span class="status" id="threadStatus">idle</span>
          <button class="button secondary" id="shareBtn" type="button">Ulashish</button>
          <button class="button secondary" id="startCallBtn" type="button">Video</button>
          <button class="button secondary" id="endCallBtn" type="button">Yopish</button>
        </div>
      </header>
      <div class="messages" id="messages"><div class="empty" data-chat-empty>Thread tanlang yoki yangi yozishma boshlang.</div></div>
      <div class="composer">
        <div class="preview" id="previewBox">
          <img id="previewImage" alt="Tanlangan rasm" />
          <div>
            <strong id="previewName"></strong>
            <div class="helper">Rasm xabar bilan yuboriladi.</div>
            <button class="button secondary" id="clearImageBtn" type="button">Olib tashlash</button>
          </div>
        </div>
        <textarea id="messageInput" placeholder="Xabaringizni yozing..."></textarea>
        <div class="composer-actions">
          <div class="chat-tools">
            <button class="button secondary" id="cameraBtn" type="button">Kamera</button>
            <button class="button secondary" id="uploadBtn" type="button">Media</button>
          </div>
          <button class="button primary" id="sendBtn" type="button">Yuborish</button>
        </div>
        <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />
        <input id="fileInput" type="file" accept="image/*" hidden />
        <div id="statusText" class="helper"></div>
      </div>
    </section>

    <aside class="rail">
      <article class="panel" id="counterpartCard">
        <span class="pill">Mutaxassis</span>
        <div class="empty" style="margin-top:12px;">Thread tanlang.</div>
      </article>
      <article class="video-card">
        <span class="pill" id="siteVideoLabel">Video</span>
        <div class="helper" id="videoStatusText" style="margin-top:12px;">Video holati tekshirilmoqda...</div>
        <div class="video-actions" style="margin-top:12px;">
          <button class="button primary" id="startCallBtnSide" type="button">Boshlash</button>
          <button class="button secondary" id="endCallBtnSide" type="button">Yopish</button>
        </div>
        <div class="video-frame" style="margin-top:12px;"><video id="localVideo" playsinline autoplay muted></video></div>
        <div class="video-frame" style="margin-top:12px;"><video id="remoteVideo" playsinline autoplay></video></div>
      </article>
    </aside>
  </main>
  <script>
    const state={ user:null, threads:[], threadId:new URLSearchParams(location.search).get("threadId")||"", thread:null, draftMessage:"", selectedImage:null, videoConfig:{ ready:false, iceServers:[] }, signalCursor:0, refreshTimer:null, signalTimer:null, peerConnection:null, localStream:null, remoteStream:null };
    const threadListEl=document.getElementById("threadList"), messagesEl=document.getElementById("messages"), counterpartCard=document.getElementById("counterpartCard"), statusText=document.getElementById("statusText"), videoStatusText=document.getElementById("videoStatusText"), chatTitle=document.getElementById("chatTitle"), chatSubtitle=document.getElementById("chatSubtitle"), threadStatus=document.getElementById("threadStatus"), messageInput=document.getElementById("messageInput"), previewBox=document.getElementById("previewBox"), previewImage=document.getElementById("previewImage"), previewName=document.getElementById("previewName");

    function escapeHtml(value){return String(value||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
    function setStatus(text,tone="helper"){statusText.textContent=text; statusText.className=tone}
    function getCounterpart(thread){ if(!thread||!state.user) return null; if(state.user.id===thread.providerId) return thread.requester||null; if(state.user.id===thread.userId) return thread.provider||null; return thread.provider||thread.requester||null; }
    function summaryCounterpart(thread){ if(!thread||!state.user) return null; if(state.user.role==="provider"||state.user.id===thread.providerId) return thread.requester||null; return thread.provider||null; }
    function updateThreadId(nextId){ state.threadId=nextId||""; const url=state.threadId?`/chat.html?threadId=${encodeURIComponent(state.threadId)}`:"/chat.html"; history.replaceState({}, "", url); }

    async function ensureAuth(){
      const response=await fetch("/api/auth/me");
      const data=await response.json();
      if(!data.user){ location.href=`/login.html?next=${encodeURIComponent(location.pathname+location.search)}`; throw new Error("Unauthenticated"); }
      state.user=data.user;
    }

    async function loadVideoConfig(){
      const response=await fetch("/api/video-config");
      const data=await response.json();
      state.videoConfig=data;
      videoStatusText.textContent=data.ready?"Video tayyor.":"TURN yoki video sozlanmagan.";
    }

    async function loadThreads(){
      const response=await fetch("/api/provider-threads");
      const data=await response.json();
      if(!response.ok) throw new Error(data.error || "Threadlar yuklanmadi.");
      state.threads=data.threads||[];
      if(!state.threads.length){
        threadListEl.innerHTML='<div class="empty">Hali service thread yo\'q. <a href="/search.html">Qidiruv</a> orqali boshlang.</div>';
        state.thread=null;
        updateThreadId("");
        renderThread();
        renderCounterpart();
        return;
      }
      if(!state.threadId || !state.threads.some((thread)=>thread.id===state.threadId)){
        updateThreadId(state.threads[0].id);
      }
      renderThreadList();
      await loadThread();
    }

    function renderThreadList(){
      threadListEl.innerHTML=state.threads.map((thread)=>{
        const counterpart=summaryCounterpart(thread);
        const name=counterpart?.name || thread.providerTypeLabel || "Service";
        return `<article class="thread-item ${thread.id===state.threadId?"active":""}" data-id="${thread.id}"><div class="meta"><span class="status ${escapeHtml(thread.status||"requested")}">${escapeHtml(thread.status||"requested")}</span><span>${escapeHtml(thread.providerTypeLabel||"Service")}</span></div><strong>${escapeHtml(name)}</strong><small>${escapeHtml(thread.lastMessagePreview||"Yozishma tayyor.")}</small></article>`;
      }).join("");
      threadListEl.querySelectorAll("[data-id]").forEach((item)=>item.addEventListener("click", async()=>{ if(item.dataset.id===state.threadId) return; stopCallLocally(); updateThreadId(item.dataset.id); renderThreadList(); await loadThread(); }));
    }

    async function loadThread(){
      if(!state.threadId){ renderThread(); renderCounterpart(); return; }
      const response=await fetch(`/api/provider-thread?id=${encodeURIComponent(state.threadId)}`);
      const data=await response.json();
      if(!response.ok) throw new Error(data.error || "Thread yuklanmadi.");
      state.thread=data.thread;
      state.signalCursor=Math.max(0,...(state.thread.callSignals||[]).map((item)=>item.ts||0));
      renderThreadList();
      renderThread();
      renderCounterpart();
    }

    function renderThread(){
      if(!state.thread){
        chatTitle.textContent="Service chat";
        chatSubtitle.textContent="Thread tanlang.";
        threadStatus.textContent="idle";
        threadStatus.className="status";
        messagesEl.innerHTML='<div class="empty" data-chat-empty>Thread tanlang yoki yangi yozishma boshlang.</div>';
        return;
      }
      const counterpart=getCounterpart(state.thread);
      chatTitle.textContent=counterpart?.name || state.thread.title || "Service chat";
      chatSubtitle.textContent=state.thread.providerTypeLabel || "Service";
      threadStatus.textContent=state.thread.status || "active";
      threadStatus.className=`status ${state.thread.status || "active"}`;
      const messages=state.thread.messages||[];
      if(!messages.length){
        messagesEl.innerHTML='<div class="empty" data-chat-empty>Xabar yozing yoki rasm yuboring.</div>';
        return;
      }
      messagesEl.innerHTML=messages.map((message)=>{
        const self=message.senderId===state.user.id;
        const speaker=self?"Siz":(message.senderRole==="provider"?"Mutaxassis":"Mijoz");
        return `<article class="message ${self?"self":"peer"}"><div class="meta"><span>${speaker}</span><span>${new Date(message.createdAt).toLocaleString()}</span></div>${message.text?`<div>${escapeHtml(message.text).replaceAll("\n","<br />")}</div>`:""}${message.imageUrl?`<img src="${message.imageUrl}" alt="Yuborilgan media" />`:""}</article>`;
      }).join("");
      messagesEl.scrollTop=messagesEl.scrollHeight;
    }

    function renderCounterpart(){
      if(!state.thread){
        counterpartCard.innerHTML='<span class="pill">Mutaxassis</span><div class="empty" style="margin-top:12px;">Thread tanlang.</div>';
        return;
      }
      const counterpart=getCounterpart(state.thread);
      counterpartCard.innerHTML=`<span class="pill">Mutaxassis</span><h2 style="margin-top:12px;font-size:1.4rem;">${escapeHtml(counterpart?.name || "Service contact")}</h2><div class="details" style="margin-top:12px;"><div><strong>Status:</strong> ${escapeHtml(state.thread.status || "active")}</div><div><strong>Yo'nalish:</strong> ${escapeHtml(state.thread.providerTypeLabel || state.thread.providerType || "Service")}</div><div><strong>Lokatsiya:</strong> ${escapeHtml(counterpart?.locationLabel || counterpart?.company || "Kiritilmagan")}</div><div><strong>Xizmat:</strong> ${escapeHtml(counterpart?.consultationFee || counterpart?.providerServices || "Kiritilmagan")}</div></div>`;
    }

    async function sendMessage(){
      const text=messageInput.value.trim();
      if(!state.threadId || (!text && !state.selectedImage)) return;
      setStatus("Yuborilmoqda...");
      try{
        let upload=null;
        if(state.selectedImage){
          const uploadRes=await fetch("/api/upload-image",{ method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ assistantId:"service-chat", dataUrl:state.selectedImage.dataUrl, fileName:state.selectedImage.name }) });
          const uploadData=await uploadRes.json();
          if(!uploadRes.ok) throw new Error(uploadData.error || "Rasm yuklanmadi.");
          upload=uploadData;
        }
        const response=await fetch("/api/provider-thread/message",{ method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ threadId:state.threadId, message:text, imageUrl:upload?.imageUrl||"", imagePublicId:upload?.imagePublicId||"" }) });
        const data=await response.json();
        if(!response.ok) throw new Error(data.error || "Xabar yuborilmadi.");
        state.draftMessage="";
        messageInput.value="";
        clearSelectedImage();
        await loadThreads();
        setStatus("Xabar yuborildi.","success");
      }catch(error){ setStatus(error.message,"error"); }
    }

    function setSelectedImage(file,dataUrl){ state.selectedImage={ name:file.name, dataUrl }; previewImage.src=dataUrl; previewName.textContent=file.name; previewBox.style.display="flex"; }
    function clearSelectedImage(){ state.selectedImage=null; previewBox.style.display="none"; document.getElementById("cameraInput").value=""; document.getElementById("fileInput").value=""; }
    function bindFileInput(input){ input.addEventListener("change",()=>{ const file=input.files?.[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>setSelectedImage(file,reader.result); reader.readAsDataURL(file); }); }

    async function sendSignal(type,payload){
      const response=await fetch("/api/provider-call/signal",{ method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ threadId:state.threadId, type, payload }) });
      if(!response.ok) throw new Error("Signal yuborilmadi.");
    }

    async function ensureLocalStream(){
      if(state.localStream) return state.localStream;
      state.localStream=await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
      document.getElementById("localVideo").srcObject=state.localStream;
      return state.localStream;
    }

    function closePeerOnly(){
      if(state.peerConnection){
        state.peerConnection.onicecandidate=null;
        state.peerConnection.ontrack=null;
        state.peerConnection.close();
        state.peerConnection=null;
      }
      if(state.remoteStream){
        state.remoteStream.getTracks().forEach((track)=>track.stop());
        state.remoteStream=null;
      }
      document.getElementById("remoteVideo").srcObject=null;
    }

    function stopLocalStream(){
      if(state.localStream){
        state.localStream.getTracks().forEach((track)=>track.stop());
        state.localStream=null;
      }
      document.getElementById("localVideo").srcObject=null;
    }

    function stopCallLocally(){
      closePeerOnly();
      stopLocalStream();
      videoStatusText.textContent=state.videoConfig.ready?"Video tayyor.":"TURN yoki video sozlanmagan.";
    }

    async function ensurePeerConnection(){
      if(state.peerConnection) return state.peerConnection;
      const pc=new RTCPeerConnection({ iceServers:state.videoConfig.iceServers||[] });
      const localStream=await ensureLocalStream();
      localStream.getTracks().forEach((track)=>pc.addTrack(track,localStream));
      pc.ontrack=(event)=>{ const stream=event.streams?.[0]; if(stream){ state.remoteStream=stream; document.getElementById("remoteVideo").srcObject=stream; } };
      pc.onicecandidate=(event)=>{ if(event.candidate) sendSignal("ice-candidate",event.candidate.toJSON()).catch(()=>{}); };
      pc.onconnectionstatechange=()=>{ videoStatusText.textContent=`Call: ${pc.connectionState}`; };
      state.peerConnection=pc;
      return pc;
    }

    async function processSignal(signal){
      if(!signal) return;
      if(signal.type==="hangup"){ stopCallLocally(); return; }
      const pc=await ensurePeerConnection();
      if(signal.type==="offer"){
        await pc.setRemoteDescription(new RTCSessionDescription(signal.payload));
        const answer=await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await sendSignal("answer",pc.localDescription);
      }else if(signal.type==="answer"){
        await pc.setRemoteDescription(new RTCSessionDescription(signal.payload));
      }else if(signal.type==="ice-candidate" && signal.payload){
        try { await pc.addIceCandidate(new RTCIceCandidate(signal.payload)); } catch (_) {}
      }
    }

    async function pollSignals(){
      if(!state.threadId || !state.videoConfig.ready) return;
      const response=await fetch(`/api/provider-call/signals?threadId=${encodeURIComponent(state.threadId)}&since=${state.signalCursor}`);
      const data=await response.json();
      if(!response.ok) return;
      for(const signal of data.signals||[]){
        state.signalCursor=Math.max(state.signalCursor,signal.ts||0);
        await processSignal(signal);
      }
    }

    async function startCall(){
      if(!state.threadId){ setStatus("Avval thread tanlang.","error"); return; }
      if(!state.videoConfig.ready){ setStatus("Video tayyor emas.","error"); return; }
      try{
        const pc=await ensurePeerConnection();
        const offer=await pc.createOffer();
        await pc.setLocalDescription(offer);
        await sendSignal("offer",pc.localDescription);
        setStatus("Video taklif yuborildi.","success");
      }catch(error){ setStatus(error.message,"error"); }
    }

    async function endCall(sendHangup=true){
      try{
        if(sendHangup && state.threadId){ await sendSignal("hangup",{ endedAt:new Date().toISOString() }); }
      }catch(_){}
      stopCallLocally();
    }

    async function refreshActiveThread(){
      if(!state.threadId) return;
      try { await loadThread(); } catch (_) {}
    }

    document.getElementById("cameraBtn").addEventListener("click",()=>document.getElementById("cameraInput").click());
    document.getElementById("uploadBtn").addEventListener("click",()=>document.getElementById("fileInput").click());
    document.getElementById("clearImageBtn").addEventListener("click",clearSelectedImage);
    document.getElementById("sendBtn").addEventListener("click",sendMessage);
    document.getElementById("shareBtn").addEventListener("click",async()=>{ try{ await navigator.clipboard.writeText(location.href); setStatus("Havola nusxalandi.","success"); }catch(_){ setStatus("Nusxalab bo'lmadi.","error"); } });
    document.getElementById("startCallBtn").addEventListener("click",startCall);
    document.getElementById("endCallBtn").addEventListener("click",()=>endCall(true));
    document.getElementById("startCallBtnSide").addEventListener("click",startCall);
    document.getElementById("endCallBtnSide").addEventListener("click",()=>endCall(true));
    messageInput.addEventListener("input",(event)=>{ state.draftMessage=event.currentTarget.value; });
    bindFileInput(document.getElementById("cameraInput"));
    bindFileInput(document.getElementById("fileInput"));

    Promise.resolve()
      .then(ensureAuth)
      .then(loadVideoConfig)
      .then(loadThreads)
      .then(()=>{ if(state.draftMessage) messageInput.value=state.draftMessage; state.refreshTimer=setInterval(refreshActiveThread,5000); state.signalTimer=setInterval(()=>pollSignals().catch(()=>{}),2000); })
      .catch((error)=>{ if(error.message!=="Unauthenticated") setStatus(error.message,"error"); });

    window.addEventListener("beforeunload",()=>{ stopCallLocally(); if(state.refreshTimer) clearInterval(state.refreshTimer); if(state.signalTimer) clearInterval(state.signalTimer); });
  </script>
</body>
</html>
